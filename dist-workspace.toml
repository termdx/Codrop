[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Homebrew tap to publish the generated formula into (a separate github.com/termdx/homebrew-tap
# repo). Publishing there needs a HOMEBREW_TAP_TOKEN secret with write access to that repo.
tap = "termdx/homebrew-tap"
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax). Unix only — the daemon uses
# setsid()/libc and preserves unix modes/symlinks, so Windows isn't supported. No musl (avoids
# static-link friction with ring + bundled SQLite); no aarch64-linux for the first release.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Where to host releases
hosting = "github"

# Run dist's orchestration jobs (plan, build-global-artifacts, host, publish, announce) on
# Blacksmith's faster runners. The special `global` key targets the non-build jobs; per-target
# build runners are left at dist's defaults.
[dist.github-custom-runners]
global = "blacksmith-4vcpu-ubuntu-2204"
